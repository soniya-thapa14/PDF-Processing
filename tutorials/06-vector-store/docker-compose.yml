services:
  postgres:
    build: .
    container_name: pdf_vectorstore
    environment:
      POSTGRES_DB: pdf_embeddings
      POSTGRES_USER: tutorial
      POSTGRES_PASSWORD: tutorial_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutorial -d pdf_embeddings"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
